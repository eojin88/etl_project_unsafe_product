server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:ai_project_db}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:1234}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

python:
  etl:
    url: ${PYTHON_ETL_URL:http://localhost:5000/etl/run}
